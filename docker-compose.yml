services:
  postgres:
    image: postgres:16-alpine
    container_name: paylash-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: paylash
      POSTGRES_USER: paylash
      POSTGRES_PASSWORD: paylash_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paylash"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: paylash-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: paylash
      MINIO_ROOT_PASSWORD: paylash_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  collabora:
    image: collabora/code:latest
    container_name: paylash-collabora
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      - server_name=localhost
      - extra_params=--o:ssl.enable=false --o:net.proto=IPv4
      - aliasgroup1=http://paylash-app:8080
    cap_add:
      - MKNOD
    extra_hosts:
      - "host.docker.internal:host-gateway"

  app:
    build: .
    container_name: paylash-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PAYLASH_PORT: "8080"
      PAYLASH_DB_URL: "postgres://paylash:paylash_secret@postgres:5432/paylash?sslmode=disable"
      PAYLASH_MINIO_ENDPOINT: "minio:9000"
      PAYLASH_MINIO_ACCESS_KEY: "paylash"
      PAYLASH_MINIO_SECRET_KEY: "paylash_secret"
      PAYLASH_MINIO_USE_SSL: "false"
      PAYLASH_COLLABORA_URL: "http://collabora:9980"
      PAYLASH_JWT_SECRET: "paylash-production-secret"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      collabora:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
